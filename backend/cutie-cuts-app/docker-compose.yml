services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutie-cuts-backend
    depends_on:
      - postgres
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/haircut_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "postgres"
      SERVER_PORT: 8081
      JWT_SECRET: change-me-to-a-long-random-secret-key-at-least-32-bytes
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      VIETQR_BANK_ID: ${VIETQR_BANK_ID:-970422}
      VIETQR_ACCOUNT_NO: ${VIETQR_ACCOUNT_NO:-100845448666}
      VIETQR_ACCOUNT_NAME: ${VIETQR_ACCOUNT_NAME:-CUTIE CUTS SALON}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_AVATARS: avatars
      S3_BUCKET_GALLERY: gallery
      S3_BUCKET_BARBERS: barbers
    ports:
      - "8081:8081"

  postgres:
    image: postgres:16
    container_name: cutie-cuts-postgres
    environment:
      POSTGRES_DB: haircut_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: cutie-cuts-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  minio_data:
