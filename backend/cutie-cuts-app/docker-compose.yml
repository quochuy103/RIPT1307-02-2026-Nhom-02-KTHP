services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutie-cuts-backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/haircut_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8081
      JWT_SECRET: change-me-to-a-long-random-secret-key-at-least-32-bytes
    ports:
      - "8081:8081"

  postgres:
    image: postgres:16
    container_name: cutie-cuts-postgres
    environment:
      POSTGRES_DB: haircut_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
