spring.application.name=cutie-cuts-app

spring.datasource.url=jdbc:postgresql://localhost:5433/haircut_db
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=${SERVER_PORT:8081}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

# OAuth2
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
