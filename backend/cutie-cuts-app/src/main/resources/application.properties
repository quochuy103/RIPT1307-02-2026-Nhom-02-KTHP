spring.application.name=cutie-cuts-app

spring.datasource.url=jdbc:postgresql://160.250.5.197:5433/haircut_db
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
server.port=${SERVER_PORT:8081}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://cutiecut.netlify.app,https://cutiecuts.netlify.app,http://localhost:*}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

# OAuth2
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}

app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

# VietQR Payment Configuration
vietqr.api.url=https://api.vietqr.io/v2
vietqr.bank.id=${VIETQR_BANK_ID:970422}
vietqr.account.no=${VIETQR_ACCOUNT_NO:100845448666}
vietqr.account.name=${VIETQR_ACCOUNT_NAME:CUTIE CUTS SALON}
vietqr.template=compact
app.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
app.payment.expiry-check-delay-ms=${PAYMENT_EXPIRY_CHECK_DELAY_MS:60000}

# S3/MinIO Storage Configuration
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.public-url=${S3_PUBLIC_URL:http://localhost:9000}
s3.browser-proxy-path=${S3_BROWSER_PROXY_PATH:/minio}
s3.access-key=${S3_ACCESS_KEY:minioadmin}
s3.secret-key=${S3_SECRET_KEY:minioadmin}
s3.bucket-avatars=${S3_BUCKET_AVATARS:avatars}
s3.bucket-gallery=${S3_BUCKET_GALLERY:gallery}
s3.bucket-barbers=${S3_BUCKET_BARBERS:barbers}

# Email
app.mail.provider=${APP_MAIL_PROVIDER:console}
app.mail.from=${MAIL_FROM:LĂ¬ He Mens Hair Designer <noreply@cutiecuts.local>}
app.resend.api-key=${RESEND_API_KEY:}

# SMTP (used when APP_MAIL_PROVIDER=smtp)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password Reset OTP
app.password-reset.otp-expiry-minutes=${PASSWORD_RESET_OTP_EXPIRY_MINUTES:10}
app.password-reset.max-attempts=${PASSWORD_RESET_MAX_ATTEMPTS:5}
app.password-reset.resend-cooldown-seconds=${PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:60}

# Email Verification OTP
app.email-verification.otp-expiry-minutes=${EMAIL_VERIFICATION_OTP_EXPIRY_MINUTES:10}
app.email-verification.max-attempts=${EMAIL_VERIFICATION_MAX_ATTEMPTS:5}
app.email-verification.resend-cooldown-seconds=${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}

# File Upload Limits (default Spring Boot is 1MB, increase to 10MB for avatar uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# API cache
app.cache.admin-dashboard.ttl-seconds=${ADMIN_DASHBOARD_CACHE_TTL_SECONDS:60}
app.cache.cleanup-interval-ms=${APP_CACHE_CLEANUP_INTERVAL_MS:300000}
