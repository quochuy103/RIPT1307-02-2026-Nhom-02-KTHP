spring.application.name=cutie-cuts-app

spring.datasource.url=jdbc:postgresql://localhost:5433/haircut_db
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=${SERVER_PORT:8081}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

# OAuth2
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}

app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

# VietQR Payment Configuration
vietqr.api.url=https://api.vietqr.io/v2
vietqr.bank.id=${VIETQR_BANK_ID:970422}
vietqr.account.no=${VIETQR_ACCOUNT_NO:100845448666}
vietqr.account.name=${VIETQR_ACCOUNT_NAME:CUTIE CUTS SALON}
vietqr.template=compact
app.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
app.payment.expiry-check-delay-ms=${PAYMENT_EXPIRY_CHECK_DELAY_MS:60000}

