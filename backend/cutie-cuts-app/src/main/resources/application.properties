spring.application.name=cutie-cuts-app
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/haircut_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=${SERVER_PORT:8081}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

# OAuth2
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}
