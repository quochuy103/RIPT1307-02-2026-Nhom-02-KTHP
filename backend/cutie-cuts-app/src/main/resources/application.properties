spring.application.name=cutie-cuts-app

spring.datasource.url=jdbc:postgresql://localhost:5433/haircut_db
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
server.port=${SERVER_PORT:8081}

app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}

# OAuth2
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}

app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

# VietQR Payment Configuration
vietqr.api.url=https://api.vietqr.io/v2
vietqr.bank.id=${VIETQR_BANK_ID:970422}
vietqr.account.no=${VIETQR_ACCOUNT_NO:100845448666}
vietqr.account.name=${VIETQR_ACCOUNT_NAME:CUTIE CUTS SALON}
vietqr.template=compact

# S3/MinIO Storage Configuration
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.public-url=${S3_PUBLIC_URL:http://localhost:9000}
s3.access-key=${S3_ACCESS_KEY:minioadmin}
s3.secret-key=${S3_SECRET_KEY:minioadmin}
s3.bucket-avatars=${S3_BUCKET_AVATARS:avatars}
s3.bucket-gallery=${S3_BUCKET_GALLERY:gallery}
s3.bucket-barbers=${S3_BUCKET_BARBERS:barbers}

# File Upload Limits (default Spring Boot is 1MB, increase to 10MB for avatar uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
